name: Update PKGBUILD

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]

permissions:
  contents: write

jobs:
  update-pkgbuild:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: |
          # Get the tag from the workflow run that triggered this
          git fetch --tags
          # Get the latest tag
          TAG=$(git tag --sort=-v:refname | head -n1)
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Update PKGBUILD files
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD-bin
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD-bin

      - name: Download release tarball and update checksums
        run: |
          # Download the Linux x86_64 tarball
          wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/clean-history-linux-x86_64.tar.gz

          # Calculate SHA256
          SHA256=$(sha256sum clean-history-linux-x86_64.tar.gz | awk '{print $1}')

          # Update PKGBUILD-bin with real checksum
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA256')/" PKGBUILD-bin

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD PKGBUILD-bin
          git commit -m "chore: update PKGBUILD to v${{ steps.version.outputs.version }}"
          git push

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          # Configure SSH to use the key for AUR
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone and update AUR repository (clean-history-bin)
        run: |
          # Clone with explicit SSH command
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes" git clone ssh://aur@aur.archlinux.org/clean-history-bin.git aur-repo
          cd aur-repo

          # Copy updated PKGBUILD-bin as PKGBUILD
          cp ../PKGBUILD-bin PKGBUILD

          # Generate .SRCINFO using Arch Linux container
          docker run --rm \
            -v "$PWD:/pkg" -w /pkg \
            -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) \
            archlinux:latest bash -lc '
              set -e
              # Prepare pacman keyring to avoid pacman-key errors
              pacman-key --init || true
              pacman-key --populate archlinux || true

              pacman -Syu --noconfirm base-devel

              # Create group/user with host UID/GID so files remain owned by the runner
              groupadd -g $HOST_GID builder || true
              useradd -m -u $HOST_UID -g $HOST_GID builder || true

              # Ensure /pkg is owned by the host UID/GID inside the container
              chown -R $HOST_UID:$HOST_GID /pkg

              # Run makepkg as the non-root builder user and print srcinfo
              su - builder -c "cd /pkg && makepkg --printsrcinfo"
            ' > .SRCINFO

          # Configure git (outside Docker)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit and push to AUR (outside Docker)
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${{ steps.version.outputs.version }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes" git push
